<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12111a" />
      <stop offset="100%" stop-color="#0B0B12" />
    </linearGradient>
    <linearGradient id="heart" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF9A85" />
      <stop offset="50%" stop-color="#FF6B52" />
      <stop offset="100%" stop-color="#E8453A" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Subtle border -->
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="white" stroke-opacity="0.08" stroke-width="2" fill="none" />

  <!-- Heart-pin shape -->
  <path
    d="
      M256 420
      C252 414 68 280 68 170
      C68 95 118 56 178 56
      C212 56 236 76 256 110
      C276 76 300 56 334 56
      C394 56 444 95 444 170
      C444 280 260 414 256 420
      Z
    "
    fill="url(#heart)"
  />

  <!-- Inner glow -->
  <path
    d="
      M256 420
      C252 414 68 280 68 170
      C68 95 118 56 178 56
      C212 56 236 76 256 110
      C276 76 300 56 334 56
      C394 56 444 95 444 170
      C444 280 260 414 256 420
      Z
    "
    fill="url(#glow)"
  />

  <!-- Glass highlight -->
  <path
    d="
      M178 72
      C128 72 84 105 84 170
      C84 210 120 250 152 270
      C116 230 100 195 100 168
      C100 110 140 78 178 72
      Z
    "
    fill="white"
    fill-opacity="0.15"
  />

  <!-- Route line -->
  <path
    d="M162 180 C178 168 200 188 220 175 C240 162 256 180 276 168 C296 156 318 174 334 165"
    stroke="white"
    stroke-opacity="0.3"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Route dots -->
  <circle cx="162" cy="180" r="9" fill="white" fill-opacity="0.5" />
  <circle cx="220" cy="175" r="7" fill="white" fill-opacity="0.4" />
  <circle cx="276" cy="168" r="7" fill="white" fill-opacity="0.4" />
  <circle cx="334" cy="165" r="9" fill="white" fill-opacity="0.5" />

  <!-- AI Sparkle -->
  <path
    d="M256 222 L264 252 L294 260 L264 268 L256 298 L248 268 L218 260 L248 252 Z"
    fill="white"
    fill-opacity="0.85"
  />

  <!-- Small sparkle -->
  <path
    d="M342 218 L346 230 L358 234 L346 238 L342 250 L338 238 L326 234 L338 230 Z"
    fill="white"
    fill-opacity="0.4"
  />

  <!-- Pin dot -->
  <circle cx="256" cy="392" r="12" fill="white" fill-opacity="0.6" />
</svg>
