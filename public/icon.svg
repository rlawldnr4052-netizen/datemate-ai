<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#13121d" />
      <stop offset="100%" stop-color="#0B0B12" />
    </linearGradient>

    <linearGradient id="route" x1="100" y1="370" x2="400" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA" />
      <stop offset="35%" stop-color="#7C3AED" />
      <stop offset="65%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E0E7FF" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#A5B4FC" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="ambient" cx="55%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect x="1" y="1" width="510" height="510" rx="111" stroke="white" stroke-opacity="0.06" stroke-width="2" fill="none" />

  <!-- Ambient glow -->
  <circle cx="270" cy="200" r="160" fill="url(#ambient)" />

  <!-- Route path glow -->
  <path
    d="M 120 355 C 145 290 170 255 200 230 C 235 200 255 188 275 175 C 305 158 345 142 400 115"
    stroke="url(#route)" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.1"
  />

  <!-- Route path main -->
  <path
    d="M 120 355 C 145 290 170 255 200 230 C 235 200 255 188 275 175 C 305 158 345 142 400 115"
    stroke="url(#route)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.75"
  />

  <!-- Branch path -->
  <path
    d="M 200 230 C 215 265 255 290 300 300"
    stroke="url(#route)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.3"
  />

  <!-- Node A (start) -->
  <circle cx="120" cy="355" r="18" fill="#4338CA" />
  <circle cx="120" cy="355" r="11" fill="#818CF8" />

  <!-- Node B (mid) -->
  <circle cx="200" cy="230" r="20" fill="#7C3AED" />
  <circle cx="200" cy="230" r="12" fill="#A78BFA" />

  <!-- Node C (AI core) -->
  <circle cx="275" cy="175" r="55" fill="url(#coreGlow)" />
  <circle cx="275" cy="175" r="28" fill="#6366F1" />
  <circle cx="275" cy="175" r="18" fill="#A5B4FC" />
  <circle cx="275" cy="175" r="10" fill="white" />

  <!-- AI Sparkle -->
  <path
    d="M 275 130 L 280 162 L 312 167 L 280 172 L 275 210 L 270 172 L 238 167 L 270 162 Z"
    fill="white" fill-opacity="0.8"
  />

  <!-- Secondary sparkle -->
  <path
    d="M 335 138 L 338 150 L 350 153 L 338 156 L 335 168 L 332 156 L 320 153 L 332 150 Z"
    fill="#C4B5FD" fill-opacity="0.5"
  />

  <!-- Node D (destination) -->
  <circle cx="400" cy="115" r="18" fill="#0891B2" />
  <circle cx="400" cy="115" r="11" fill="#22D3EE" />

  <!-- Branch destination -->
  <circle cx="300" cy="300" r="14" fill="#7C3AED" fill-opacity="0.45" />
  <circle cx="300" cy="300" r="8" fill="#A78BFA" fill-opacity="0.6" />

  <!-- Ambient dots -->
  <circle cx="350" cy="270" r="6" fill="#4338CA" fill-opacity="0.2" />
  <circle cx="150" cy="160" r="5" fill="#6366F1" fill-opacity="0.18" />
  <circle cx="390" cy="210" r="4" fill="#0891B2" fill-opacity="0.18" />
  <circle cx="170" cy="320" r="3.5" fill="#7C3AED" fill-opacity="0.15" />
</svg>
